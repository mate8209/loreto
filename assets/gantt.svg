<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
<rect width="1200" height="700" fill="#f7f3ea"/>
<text x="60" y="75" font-family="Arial" font-size="38" font-weight="700" fill="#17324d">Gantt propuesto — 6 meses</text>
<text x="60" y="115" font-family="Arial" font-size="20" fill="#586575">Fase hormiga: reunir información. Fase araña: tejer acuerdos y producir una hoja de ruta.</text>
<g font-family="Arial" font-size="17">
  <text x="300" y="165" fill="#17324d" font-weight="700">M1</text><text x="430" y="165" fill="#17324d" font-weight="700">M2</text><text x="560" y="165" fill="#17324d" font-weight="700">M3</text><text x="690" y="165" fill="#17324d" font-weight="700">M4</text><text x="820" y="165" fill="#17324d" font-weight="700">M5</text><text x="950" y="165" fill="#17324d" font-weight="700">M6</text>
  <line x1="270" y1="180" x2="1040" y2="180" stroke="#d8d0c2"/>
  <g fill="#17324d"><text x="70" y="225">1. Revisión documental</text><text x="70" y="295">2. Mapeo territorial</text><text x="70" y="365">3. Entrevistas y actores</text><text x="70" y="435">4. Taller FOAR</text><text x="70" y="505">5. Hoja de ruta</text><text x="70" y="575">6. Validación final</text></g>
  <g>
    <rect x="285" y="200" width="260" height="34" rx="8" fill="#7db2be"/><text x="300" y="224" fill="#fff" font-weight="700">Hormiga</text>
    <rect x="285" y="270" width="390" height="34" rx="8" fill="#7db2be"/>
    <rect x="545" y="340" width="260" height="34" rx="8" fill="#d98b73"/><text x="560" y="364" fill="#fff" font-weight="700">Araña</text>
    <rect x="675" y="410" width="130" height="34" rx="8" fill="#d98b73"/>
    <rect x="805" y="480" width="260" height="34" rx="8" fill="#17324d"/>
    <rect x="935" y="550" width="130" height="34" rx="8" fill="#17324d"/>
  </g>
</g>
</svg>
